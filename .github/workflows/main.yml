name: Regenerate PluginMaster
on:
  workflow_dispatch:
  schedule:
  - cron: '0 * * * *'
  push:
    branches:
    - master
permissions:
  contents: write
concurrency: regenerate
jobs:
  generate:
    name: Regenerate PluginMaster
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Sync release plugins
        run: python sync_release_plugins.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate PluginMaster
        run: python generate_pluginmaster.py
      - uses: EndBug/add-and-commit@v10
        with:
          author_name: GitHub Action
          author_email: github-actions[bot]@users.noreply.github.com
          message: Regenerate PluginMaster
